<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkey Production Tester</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- CDNs for React, Babel, and SimpleWebAuthn -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: linear-gradient(90deg, #6366f1 0%, #4f46e5 100%);
      --primary-hover: linear-gradient(90deg, #818cf8 0%, #6366f1 100%);
      --success: #10b981;
      --error: #f43f5e;
      --info: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Background blobs for premium glassmorphism feel */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      filter: blur(80px);
      z-index: -1;
      animation: float 12s infinite alternate ease-in-out;
    }

    .blob-1 {
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      bottom: -150px;
      right: -100px;
      background: rgba(236, 72, 153, 0.12);
      animation-delay: -6s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    header {
      margin-bottom: 30px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #a5b4fc, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text-main);
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }

    button {
      background: var(--primary);
      border: none;
      border-radius: 14px;
      color: white;
      padding: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }

    button.secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    /* Console Logger Styling */
    .console {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      height: 250px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      padding-bottom: 6px;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
      user-select: none;
    }

    .log-text {
      word-break: break-all;
    }

    .log-item.success { color: var(--success); }
    .log-item.error { color: var(--error); }
    .log-item.info { color: var(--info); }
    .log-item.sys { color: var(--text-muted); }

    .support-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .support-badge.success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .support-badge.error {
      background: rgba(244, 63, 94, 0.1);
      color: var(--error);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { startRegistration, startAuthentication, browserSupportsWebAuthn } = SimpleWebAuthnBrowser;

    function App() {
      const [email, setEmail] = useState('test@example.com');
      const [token, setToken] = useState('');
      const [logs, setLogs] = useState([]);
      const [supportsWebAuthn, setSupportsWebAuthn] = useState(null);
      const consoleEndRef = useRef(null);

      // Check browser capabilities on startup
      useEffect(() => {
        const isSupported = browserSupportsWebAuthn();
        setSupportsWebAuthn(isSupported);
        
        addLog(
          isSupported 
            ? 'WebAuthn is supported on this browser.' 
            : 'WebAuthn is NOT supported on this browser. Ensure you are using a secure context (localhost or HTTPS).',
          isSupported ? 'success' : 'error'
        );
        addLog('Environment ready for testing. To test like a production user, do NOT enable Chrome WebAuthn DevTools virtual environment. Use your device Hello/TouchID/FaceID instead.', 'sys');
      }, []);

      // Autoscroll the console log viewer
      useEffect(() => {
        if (consoleEndRef.current) {
          consoleEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [logs]);

      const addLog = (text, type = 'info') => {
        const timestamp = new Date().toLocaleTimeString();
        setLogs(prev => [...prev, { timestamp, text, type }]);
      };

      const clearLogs = () => setLogs([]);

      const API_URL = '/api/v1';

      // ==========================================
      // REGISTER PASSKEY
      // ==========================================
      const handleRegister = async () => {
        if (!token) {
          addLog('Error: Registration requires an active JWT authentication token. Paste it in the input above.', 'error');
          return;
        }

        try {
          addLog('Initializing registration options request...', 'info');
          
          // 1. Fetch options from NestJS backend
          const optionsRes = await fetch(`${API_URL}/auth/passkey/register/options`, {
            method: 'GET',
            headers: { 
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/json'
            }
          });

          if (!optionsRes.ok) {
            const errBody = await optionsRes.text();
            throw new Error(`Options fetch failed: ${optionsRes.status} - ${errBody}`);
          }

          const options = await optionsRes.json();
          addLog(`Received registration options from server (Challenge generated: ${options.challenge})`, 'info');

          addLog('Prompting device for passkey creation (biometrics / PIN / security key)...', 'info');
          
          // 2. Trigger browser's native credential creation (TouchID / FaceID / Windows Hello)
          const credentialResponse = await startRegistration({ optionsJSON: options });
          addLog('Device successfully signed and generated credentials!', 'success');

          addLog('Sending credentials to server for validation and storage...', 'info');

          // 3. Post verification payload back to NestJS
          const verifyRes = await fetch(`${API_URL}/auth/passkey/register/verify`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}` 
            },
            body: JSON.stringify(credentialResponse)
          });

          if (!verifyRes.ok) {
            const errBody = await verifyRes.text();
            throw new Error(`Verification failed: ${verifyRes.status} - ${errBody}`);
          }

          const result = await verifyRes.json();
          addLog(`Passkey registered successfully! Device is now linked to account.`, 'success');
        } catch (err) {
          addLog(`Registration failed: ${err.message}`, 'error');
          console.error(err);
        }
      };

      // ==========================================
      // LOGIN WITH PASSKEY
      // ==========================================
      const handleLogin = async () => {
        if (!email) {
          addLog('Error: Email is required to retrieve passkey details.', 'error');
          return;
        }

        try {
          addLog(`Requesting login options for user: ${email}...`, 'info');

          // 1. Fetch authentication options
          const optionsRes = await fetch(`${API_URL}/auth/passkey/login/options`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          if (!optionsRes.ok) {
            const errBody = await optionsRes.text();
            throw new Error(`Options fetch failed: ${optionsRes.status} - ${errBody}`);
          }

          const options = await optionsRes.json();
          addLog(`Received authentication options. Allowed credential count: ${options.allowCredentials?.length || 0}`, 'info');

          addLog('Prompting device for passkey verification (biometrics / PIN)...', 'info');
          console.log('options before', options)
          addLog('options before', options)
          // 2. Trigger browser's native credential signature verification
          const assertionResponse = await startAuthentication({ optionsJSON: options });
          console.log('assertionnnnnnn', assertionResponse);
          addLog('Biometric verified, signature generated by hardware!', 'success');

          addLog('Verifying signature on server...', 'info');
          console.log('options', options);
          addLog('options', options)
          // 3. Post verification payload back to NestJS
          const verifyRes = await fetch(`${API_URL}/auth/passkey/login/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              response: assertionResponse
            })
          });

          if (!verifyRes.ok) {
            const errBody = await verifyRes.text();
            throw new Error(`Verification failed in verifyRes.ok: ${verifyRes.status} - ${errBody}`);
          }

          const result = await verifyRes.json();
          console.log('verrrrrrrrrrrr', verifyRes);
          
          // 4. Update the token in UI automatically (makes testing registration easy!)
          if (result.accessToken) {
            setToken(result.accessToken);
            addLog(`Login Successful! JWT token has been automatically copied to your registration input.`, 'success');
          } else {
            addLog(`Login Successful! Result: ${JSON.stringify(result)}`, 'success');
          }
        } catch (err) {
          addLog(`Login failed in catch: ${err.message}`, 'error');
          console.error(err);
        }
      };

      return (
        <div className="app-container">
          <header>
            <h1>Passkey Client</h1>
            <div className="subtitle">Production environment testing page for WebAuthn APIs</div>
            
            {supportsWebAuthn === true && (
              <div className="support-badge success">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                Secure Context Verified
              </div>
            )}
            {supportsWebAuthn === false && (
              <div className="support-badge error">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                Insecure Context / WebAuthn Disabled
              </div>
            )}
          </header>

          <div className="form-group">
            <label htmlFor="email">Email Address (Sign In)</label>
            <input 
              type="email" 
              id="email" 
              value={email} 
              onChange={e => setEmail(e.target.value)}
              placeholder="e.g., user@example.com"
            />
          </div>

          <div className="form-group">
            <label htmlFor="token">JWT Auth Token (Required for Sign Up / Registering Device)</label>
            <input 
              type="text" 
              id="token" 
              value={token} 
              onChange={e => setToken(e.target.value)}
              placeholder="Paste your logged-in JWT Bearer token here"
            />
          </div>

          <div className="btn-group">
            <button onClick={handleRegister} disabled={!supportsWebAuthn}>
              Register Passkey
            </button>
            <button className="secondary" onClick={handleLogin} disabled={!supportsWebAuthn}>
              Login with Passkey
            </button>
          </div>

          <div className="form-group">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
              <label>Console Logs</label>
              <span style={{ fontSize: '0.75rem', color: 'var(--text-muted)', cursor: 'pointer', textDecoration: 'underline' }} onClick={clearLogs}>Clear</span>
            </div>
            <div className="console">
              {logs.map((log, index) => (
                <div key={index} className={`log-item ${log.type}`}>
                  <span className="log-time">[{log.timestamp}]</span>
                  <span className="log-text">{log.text}</span>
                </div>
              ))}
              <div ref={consoleEndRef} />
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
