 <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Passkey Test Client</title>
      <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        button { display: block; width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; cursor: pointer; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        #status { margin-top: 20px; padding: 10px; background: #eee; word-break: break-all; }
      </style>
      <!-- Load the SimpleWebAuthn browser library -->
      <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    </head>
    <body>
      <h2>Passkey WebAuthn Test</h2>

      <div>
        <label>Email:</label>
        <input type="email" id="email" value="test@example.com">
      </div>

      <div>
        <label>Authentication Token (for registration):</label>
        <input type="text" id="token" placeholder="Paste your JWT Bearer token here">
      </div>

      <button id="registerBtn">1. Register Passkey</button>
      <button id="loginBtn">2. Login with Passkey</button>

      <h3>Status:</h3>
      <div id="status">Ready</div>

      <script>
        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;
        const API_URL = 'http://localhost:3000/api/v1';

        const statusDiv = document.getElementById('status');
        const log = (msg) => statusDiv.innerText = msg;

        // ==========================================
        // 1. REGISTER PASSKEY
        // ==========================================
        document.getElementById('registerBtn').onclick = async () => {
          try {
            log('Fetching registration options...');
            const token = document.getElementById('token').value;

            // 1. Get options from NestJS (requires auth header)
            const optionsRes = await fetch(`${API_URL}/auth/passkey/register/options`, {
              headers: { 'Authorization': `Bearer ${token}` }
            });
            const options = await optionsRes.json();

            log('Prompting authenticator (Fingerprint/FaceID)...');
            // 2. Trigger browser biometric prompt
            const credentialResponse = await startRegistration({ optionsJSON: options });

            log('Verifying registration with server...');
            // 3. Send signature back to server
            const verifyRes = await fetch(`${API_URL}/auth/passkey/register/verify`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify(credentialResponse)
            });
            const result = await verifyRes.json();
            log('Registration Successful: ' + JSON.stringify(result));
          } catch (err) {
            log('Registration Error: ' + err.message);
          }
        };

        // ==========================================
        // 2. LOGIN WITH PASSKEY
        // ==========================================
        document.getElementById('loginBtn').onclick = async () => {
          try {
            const email = document.getElementById('email').value;
            log('Fetching login options for: ' + email);

            // 1. Request authentication options
            const optionsRes = await fetch(`${API_URL}/auth/passkey/login/options`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email })
            });
            const options = await optionsRes.json();

            log('Prompting authenticator (Fingerprint/FaceID)...');
            // 2. Trigger browser biometric prompt
            const assertionResponse = await startAuthentication({ optionsJSON: options });

            log('Verifying login with server...');
            // 3. Send response back to server
            const verifyRes = await fetch(`${API_URL}/auth/passkey/login/verify`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: email,
                response: assertionResponse
              })
            });
            const result = await verifyRes.json();
            log('Login Successful! Token: ' + JSON.stringify(result));
          } catch (err) {
            log('Login Error: ' + err.message);
          }
        };
      </script>
    </body>
    </html>
